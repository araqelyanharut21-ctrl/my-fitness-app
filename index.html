<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Pro Ultimate</title>
    <style>
        :root { --primary: #007bff; --bg: #0f0f1a; --card: #1e1e2f; --item-bg: #2a2a40; --text: #ffffff; --success: #28a745; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 800px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .lang-switch button { background: #333; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-left: 5px; }
        .grid-btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: var(--card); border: 2px solid var(--primary); color: white; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .cat-btn:hover { background: var(--primary); }
        .workout-box { background: var(--card); padding: 20px; border-radius: 15px; border-top: 5px solid var(--primary); display: none; }
        .ex-item { background: var(--item-bg); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-main { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; flex: 2; font-weight: bold; }
        .btn-sec { background: #6c757d; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; flex: 1; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 20px; }
        .day { background: #333; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
        .day.done { background: var(--success); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="ui-title">Fitness Pro</h1>
    <div class="lang-switch">
        <button onclick="changeLang('am')">AM</button>
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ru')">RU</button>
    </div>
</div>

<div class="grid-btns" id="cat-btns"></div>

<div id="workout-area" class="workout-box">
    <div id="day-counter" style="text-align:center; font-weight:bold; color:var(--accent); margin-bottom:10px;"></div>
    <div id="ex-list"></div>
    <div class="nav-btns">
        <button class="btn-sec" onclick="changeDay(-1)" id="ui-prev">⏪ Նախորդ</button>
        <button class="btn-main" onclick="changeDay(1)" id="ui-next">Ավարտել ⏩</button>
    </div>
</div>

<h2 id="ui-cal-title" style="text-align:center; margin-top:30px;">Օրացույց</h2>
<div class="calendar" id="calendar"></div>

let lang = 'am';
let currentCat = 'chest';

function changeLang(l) { lang = l; render(); }

function render() {
    const cont = document.getElementById('cat-btns');
    cont.innerHTML = '';
    Object.keys(data).forEach(c => {
        let btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.innerText = categoryNames[c][lang];
        btn.onclick = () => { currentCat = c; render(); };
        cont.appendChild(btn);
    });

    document.getElementById('ui-title').innerText = lang === 'am' ? 'Ֆիթնես Պրո' : 'Fitness Pro';
    document.getElementById('ui-prev').innerText = lang === 'am' ? '⏪ Նախորդ' : '⏪ Previous';
    document.getElementById('ui-next').innerText = lang === 'am' ? 'Ավարտել ⏩' : 'Complete ⏩';
    document.getElementById('ui-cal-title').innerText = lang === 'am' ? 'Օրացույց' : 'Calendar';

    document.getElementById('workout-area').style.display = 'block';
    let day = parseInt(localStorage.getItem('day_'+currentCat)) || 1;
    document.getElementById('day-counter').innerText = `${lang === 'am' ? 'Օր' : 'Day'} ${day}`;
    
    const list = document.getElementById('ex-list');
    list.innerHTML = '';
    data[currentCat].forEach(ex => {
        let div = document.createElement('div');
        div.className = 'ex-item';
        div.innerHTML = `<h3>${ex[lang].n}</h3><p style="color:var(--accent)">${10+day} ${lang==='am'?'կրկնություն':'reps'}</p><p>${ex[lang].i}</p>`;
        list.appendChild(div);
    });

    renderCal();
}

function changeDay(delta) {
    let day = parseInt(localStorage.getItem('day_'+currentCat)) || 1;
    let newDay = Math.max(1, day + delta);
    localStorage.setItem('day_'+currentCat, newDay);
    render();
}

function renderCal() {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    let day = parseInt(localStorage.getItem('day_'+currentCat)) || 1;
    let limit = Math.max(35, day + 7);
    for(let i=1; i<=limit; i++) {
        let d = document.createElement('div');
        d.className = 'day';
        d.innerText = i;
        if(i <= day) d.classList.add('done');
        cal.appendChild(d);
    }
}

render();
